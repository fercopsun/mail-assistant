# 邮箱账户配置模板 —— 复制为 accounts.yaml 并填入真实值
# accounts.yaml 已在 .gitignore 中排除，不会被提交

accounts:
  - provider: gmail
    address: you@gmail.com
    # 在「Google 账户 → 安全 → 应用专用密码」生成，格式为 16 位字母（xxxx xxxx xxxx xxxx）
    # 填写时去掉空格
    password: your-app-password-here

  - provider: qq
    address: you@qq.com
    # 在「QQ邮箱 → 设置 → 账户 → IMAP/SMTP服务」开启后点击「生成授权码」
    # 授权码为 16 位，不是 QQ 登录密码
    password: your-qq-authcode-here

  - provider: 163
    address: you@163.com
    # 在「163邮箱 → 设置 → POP3/SMTP/IMAP → 客户端授权密码」开启后生成
    password: your-163-authcode-here

  - provider: 126
    address: you@126.com
    # 在「126邮箱 → 设置 → POP3/SMTP/IMAP → 客户端授权密码」开启后生成
    password: your-126-authcode-here
